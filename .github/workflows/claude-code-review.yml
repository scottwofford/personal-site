name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and correctness
            - Content accuracy (philosophy, translations)
            - HTML/CSS best practices
            - Accessibility concerns
            - Spanish translation quality (if ES files changed)

            Use the repository's CLAUDE.md for guidance on project conventions. Be constructive and concise.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: >-
            --model claude-opus-4-5
            --allowed-tools
            "Bash(gh issue view:*),
            Bash(gh search:*),
            Bash(gh issue list:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr list:*)"
